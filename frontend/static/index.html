<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YBM BRILiaN — Amil Profile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Loading Screen -->
  <div id="loader" class="loader">
    <div class="loader-ring"></div>
    <p class="loader-text">LOADING PROFILES<span class="dot-anim">...</span></p>
  </div>

  <!-- Main App -->
  <div id="app" class="app hidden">

    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <div class="brand-icon">⬡</div>
        <div>
          <h1 class="brand-title">YBM BRILiaN</h1>
          <p class="brand-sub">AMIL PROFILE DATABASE</p>
        </div>
      </div>
      <div class="header-controls">
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">ALL</button>
          <button class="filter-btn" data-filter="Aktif">AKTIF</button>
          <button class="filter-btn" data-filter="Non-Aktif">NON-AKTIF</button>
        </div>
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="searchInput" placeholder="Cari nama..." />
        </div>
        <div class="counter">
          <span id="counterNum">0</span>
          <span class="counter-label">AMIL</span>
        </div>
      </div>
    </header>

    <!-- Character Select Area -->
    <main class="main">

      <!-- Left: Character Carousel -->
      <section class="carousel-section">
        <div class="swiper character-swiper">
          <div class="swiper-wrapper" id="swiperWrapper">
            <!-- Slides generated by JS -->
          </div>
        </div>
        <div class="carousel-nav">
          <button class="nav-arrow nav-prev" id="prevBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <div class="slide-counter">
            <span id="currentSlide">1</span>
            <span class="slide-sep">/</span>
            <span id="totalSlides">0</span>
          </div>
          <button class="nav-arrow nav-next" id="nextBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>
      </section>

      <!-- Right: Stats Panel -->
      <section class="stats-panel" id="statsPanel">
        <div class="stats-inner">
          <div class="stats-header">
            <div class="status-badge" id="statusBadge">AKTIF</div>
            <h2 class="stats-name" id="statsName">—</h2>
            <p class="stats-alias" id="statsAlias">—</p>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon">💼</div>
              <div class="stat-info">
                <span class="stat-label">POSISI</span>
                <span class="stat-value" id="statPosisi">—</span>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">🏢</div>
              <div class="stat-info">
                <span class="stat-label">DIVISI</span>
                <span class="stat-value" id="statDivisi">—</span>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">🎓</div>
              <div class="stat-info">
                <span class="stat-label">INSTANSI PENDIDIKAN</span>
                <span class="stat-value" id="statPendidikan">—</span>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">📧</div>
              <div class="stat-info">
                <span class="stat-label">EMAIL</span>
                <span class="stat-value" id="statEmail">—</span>
              </div>
            </div>
          </div>

          <!-- Stat Bars (game-style) -->
          <div class="stat-bars">
            <div class="bar-item">
              <span class="bar-label">LEVEL</span>
              <div class="bar-track">
                <div class="bar-fill" id="barLevel" style="width:0%"></div>
              </div>
              <span class="bar-text" id="barLevelText">—</span>
            </div>
            <div class="bar-item">
              <span class="bar-label">GENDER</span>
              <div class="bar-track">
                <div class="bar-fill gender-bar" id="barGender" style="width:0%"></div>
              </div>
              <span class="bar-text" id="barGenderText">—</span>
            </div>
          </div>

          <div class="stats-footer">
            <div class="divisi-tag" id="divisiTag">—</div>
          </div>
        </div>
      </section>
    </main>

    <!-- Bottom Thumbnail Strip -->
    <div class="thumb-strip">
      <div class="swiper thumb-swiper">
        <div class="swiper-wrapper" id="thumbWrapper">
          <!-- Thumbnail slides generated by JS -->
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
